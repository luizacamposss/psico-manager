<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Agendamentos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-purple">
    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand fw-bold" href="index.html">PsicoManager</a>

        <!-- MENU -->
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="pacientes.html">Pacientes</a>
            <a class="nav-link active" href="agendamentos.html">Agendamentos</a>
            <a class="nav-link" href="agenda.html">Agenda</a>
            <a class="nav-link" href="prontuario.html">Prontuário</a>
            <a class="nav-link" href="financeiro.html">Financeiro</a>
            <a class="nav-link" href="tarefas.html">Tarefas</a>
            <a class="nav-link" href="dashboard.html">Dashboard</a>
        </div>

        <!-- USUÁRIO + LOGOUT -->
        <div class="d-flex align-items-center gap-3 text-white ms-3">
            <span id="usuarioInfo"></span>
            <button class="btn btn-light btn-sm" onclick="logout()">Sair</button>
        </div>

    </div>
</nav>

<main class="container my-5">

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 class="text-purple mb-4">Novo Agendamento</h2>

            <form id="formAgendamento" class="row g-3">
                <div class="col-md-4">
                    <input class="form-control" id="paciente_id" placeholder="ID do paciente" required>
                </div>

                <div class="col-md-4">
                    <input class="form-control" id="psicologo_id" placeholder="ID do psicólogo" required>
                </div>

                <div class="col-md-2">
                    <input class="form-control" type="date" id="data" required>
                </div>

                <div class="col-md-2">
                    <input class="form-control" type="time" id="horario" required>
                </div>

                <div class="col-md-4">
                    <select class="form-select" id="status">
                        <option>Confirmada</option>
                        <option>Pendente</option>
                        <option>Cancelada</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <button class="btn btn-purple w-100">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="text-purple mb-4">Lista de Agendamentos</h2>

            <table class="table table-striped">
                <thead class="table-purple">
                    <tr>
                        <th>ID</th>
                        <th>Paciente</th>
                        <th>Psicólogo</th>
                        <th>Data</th>
                        <th>Horário</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="listaAgendamentos"></tbody>
            </table>
        </div>
    </div>

</main>

<script src="script.js"></script>
</body>
</html>
