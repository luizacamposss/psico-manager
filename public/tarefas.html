<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tarefas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-purple">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">PsicoManager</a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="pacientes.html">Pacientes</a>
            <a class="nav-link" href="agendamentos.html">Agendamentos</a>
            <a class="nav-link" href="agenda.html">Agenda</a>
            <a class="nav-link" href="prontuario.html">Prontuário</a>
            <a class="nav-link" href="financeiro.html">Financeiro</a>
            <a class="nav-link active" href="tarefas.html">Tarefas</a>
            <a class="nav-link" href="dashboard.html">Dashboard</a>
        </div>

        <div class="d-flex align-items-center gap-3 text-white ms-3">
            <span id="usuarioInfo"></span>
            <button class="btn btn-light btn-sm" onclick="logout()">Sair</button>
        </div>
    </div>
</nav>

<main class="container my-5">

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h3 class="text-purple mb-3">Nova Tarefa</h3>

            <form id="formTarefa">
                <select class="form-select mb-2" id="paciente_id">
                    <option value="">Sem paciente vinculado</option>
                </select>

                <input class="form-control mb-2" id="titulo" placeholder="Título da tarefa" required>

                <textarea class="form-control mb-2" id="descricao" placeholder="Descrição da tarefa"></textarea>

                <select class="form-select mb-3" id="status">
                    <option value="Pendente">Pendente</option>
                    <option value="Concluída">Concluída</option>
                </select>

                <button class="btn btn-purple" type="submit">Cadastrar Tarefa</button>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="text-purple mb-3">Lista de Tarefas</h3>

            <div class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead class="table-purple">
                        <tr>
                            <th>ID</th>
                            <th>Paciente</th>
                            <th>Título</th>
                            <th>Descrição</th>
                            <th>Status</th>
                            <th>Data</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaTarefas"></tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<script src="script.js"></script>
</body>
</html>
