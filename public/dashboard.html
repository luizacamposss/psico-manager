<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-purple">
    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand fw-bold" href="index.html">PsicoManager</a>

        <!-- MENU -->
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="pacientes.html">Pacientes</a>
            <a class="nav-link" href="agendamentos.html">Agendamentos</a>
            <a class="nav-link" href="agenda.html">Agenda</a>
            <a class="nav-link" href="prontuario.html">Prontuário</a>
            <a class="nav-link" href="financeiro.html">Financeiro</a>
            <a class="nav-link" href="tarefas.html">Tarefas</a>
            <a class="nav-link active" href="dashboard.html">Dashboard</a>
        </div>

        <!-- USUÁRIO + LOGOUT -->
        <div class="d-flex align-items-center gap-3 text-white ms-3">
            <span id="usuarioInfo"></span>
            <button class="btn btn-light btn-sm" onclick="logout()">Sair</button>
        </div>

    </div>
</nav>

<main class="container my-5">

     <!-- BOTÃO PDF -->
    <div class="d-flex justify-content-end mb-3">
        <button class="btn btn-purple" onclick="exportarDashboardPDF()">
            Exportar PDF
        </button>
    </div>

    <h2 class="text-purple mb-4">Dashboard da Clínica</h2>

    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card text-center shadow-sm p-3">
                <h5>Total de Pacientes</h5>
                <h2 id="totalPacientes">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow-sm p-3">
                <h5>Total de Agendamentos</h5>
                <h2 id="totalAgendamentos">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow-sm p-3">
                <h5>Confirmados</h5>
                <h2 id="confirmados">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow-sm p-3">
                <h5>Cancelados</h5>
                <h2 id="cancelados">0</h2>
            </div>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="card text-center shadow-sm p-3">
                <h5>Total Recebido</h5>
                <h2 id="totalRecebido">R$ 0,00</h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card text-center shadow-sm p-3">
                <h5>Total Pendente</h5>
                <h2 id="totalPendente">R$ 0,00</h2>
            </div>
        </div>
    </div>

    <div class="card shadow-sm p-4">
        <h4 class="text-purple mb-3">Receita Mensal</h4>
        <canvas id="graficoReceitas"></canvas>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
