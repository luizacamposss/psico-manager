<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Prontuário</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-purple">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">PsicoManager</a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="pacientes.html">Pacientes</a>
            <a class="nav-link" href="agendamentos.html">Agendamentos</a>
            <a class="nav-link" href="agenda.html">Agenda</a>
            <a class="nav-link active" href="prontuario.html">Prontuário</a>
            <a class="nav-link" href="financeiro.html">Financeiro</a>
            <a class="nav-link" href="tarefas.html">Tarefas</a>
            <a class="nav-link" href="dashboard.html">Dashboard</a>
        </div>

        <div class="d-flex align-items-center gap-3 text-white ms-3">
            <span id="usuarioInfo"></span>
            <button class="btn btn-light btn-sm" onclick="logout()">Sair</button>
        </div>
    </div>
</nav>

<main class="container my-5">

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h3 class="text-purple mb-3">Novo Registro de Prontuário</h3>

            <form id="formProntuario">
                <select class="form-select mb-2" id="paciente_id" required>
                    <option value="">Selecione o paciente</option>
                </select>

                <select class="form-select mb-2" id="agendamento_id">
                    <option value="">Selecione o agendamento</option>
                </select>

                <textarea class="form-control mb-3" id="anotacoes" placeholder="Anotações clínicas..." required></textarea>

                <select class="form-select mb-3" id="status_preenchimento" required>
                    <option value="Pendente">Pendente</option>
                    <option value="Parcial">Parcial</option>
                    <option value="Completo">Completo</option>
                </select>

                <button class="btn btn-purple" type="submit">Salvar Registro</button>

            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="text-purple mb-3">Histórico do Paciente</h3>

            <button class="btn btn-secondary mb-3" onclick="buscarProntuarios()">Buscar Histórico</button>

            <ul id="listaProntuarios" class="list-group"></ul>
        </div>
    </div>

</main>

<script src="script.js"></script>
</body>
</html>
