<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Financeiro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-purple">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">PsicoManager</a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="pacientes.html">Pacientes</a>
            <a class="nav-link" href="agendamentos.html">Agendamentos</a>
            <a class="nav-link" href="agenda.html">Agenda</a>
            <a class="nav-link" href="prontuario.html">Prontuário</a>
            <a class="nav-link active" href="financeiro.html">Financeiro</a>
            <a class="nav-link" href="tarefas.html">Tarefas</a>
            <a class="nav-link" href="dashboard.html">Dashboard</a>
        </div>

        <div class="d-flex align-items-center gap-3 text-white ms-3">
            <span id="usuarioInfo"></span>
            <button class="btn btn-light btn-sm" onclick="logout()">Sair</button>
        </div>
    </div>
</nav>

<main class="container my-5">

    <div class="card p-4 mb-4">
        <h3>Novo Pagamento</h3>

        <form id="formFinanceiro">
            <select class="form-select mb-2" id="paciente_id" required></select>

            <select class="form-select mb-2" id="agendamento_id">
                <option value="">Selecione o agendamento</option>
            </select>

            <input class="form-control mb-2" id="valor" placeholder="Valor" required>

            <select class="form-select mb-2" id="forma_pagamento">
                <option>Pix</option>
                <option>Cartão</option>
                <option>Dinheiro</option>
            </select>

            <select class="form-select mb-3" id="status">
                <option>Pago</option>
                <option>Pendente</option>
            </select>

            <button class="btn btn-purple">Registrar</button>
        </form>
    </div>

    <div class="card p-4">
        <h3>Lista Financeira</h3>
        <table class="table">
            <thead>
                <tr>
                    <th>Paciente</th>
                    <th>Valor</th>
                    <th>Pagamento</th>
                    <th>Status</th>
                    <th>Data</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaFinanceiro"></tbody>
        </table>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="script.js"></script>
</body>
</html>
