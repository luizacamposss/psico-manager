<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-purple">
    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand fw-bold" href="index.html">PsicoManager</a>

        <!-- MENU -->
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" href="pacientes.html">Pacientes</a>
            <a class="nav-link" href="agendamentos.html">Agendamentos</a>
            <a class="nav-link" href="agenda.html">Agenda</a>
            <a class="nav-link" href="prontuario.html">Prontuário</a>
            <a class="nav-link" href="financeiro.html">Financeiro</a>
            <a class="nav-link" href="tarefas.html">Tarefas</a>
            <a class="nav-link" href="dashboard.html">Dashboard</a>
        </div>

        <!-- USUÁRIO + LOGOUT -->
        <div class="d-flex align-items-center gap-3 text-white ms-3">
            <span id="usuarioInfo"></span>
            <button class="btn btn-light btn-sm" onclick="logout()">Sair</button>
        </div>

    </div>
</nav>

<main class="container my-5">
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 class="mb-4 text-purple">Cadastro de Pacientes</h2>

           <form id="formPaciente" class="row g-3">

                <div class="col-md-6">
                    <input class="form-control" type="text" id="nome" placeholder="Nome do paciente" required>
                </div>

                <div class="col-md-6">
                    <input class="form-control" type="text" id="cpf" placeholder="CPF">
                </div>

                <div class="col-md-6">
                    <input class="form-control" type="text" id="telefone" placeholder="Telefone">
                </div>

                <div class="col-md-6">
                    <input class="form-control" type="email" id="email" placeholder="E-mail">
                </div>

                <div class="col-md-6">
                    <input class="form-control" type="date" id="data_nascimento">
                </div>

                <div class="col-md-6">
                    <input class="form-control" type="text" id="contato_emergencia" placeholder="Contato de emergência">
                </div>

                <div class="col-12">
                    <textarea class="form-control" id="queixa_principal" placeholder="Queixa principal"></textarea>
                </div>

                <div class="col-12">
                    <textarea class="form-control" id="historico_clinico" placeholder="Histórico clínico"></textarea>
                </div>

                <div class="col-12">
                    <textarea class="form-control" id="medicamentos" placeholder="Medicamentos em uso"></textarea>
                </div>

                <div class="col-12">
                    <textarea class="form-control" id="observacoes" placeholder="Observações gerais"></textarea>
                </div>

                <div class="col-12">
                    <button class="btn btn-purple" type="submit">Cadastrar Paciente</button>
                </div>

</form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="mb-4 text-purple">Lista de Pacientes</h2>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-purple">
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Telefone</th>
                            <th>E-mail</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="listaPacientes"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
